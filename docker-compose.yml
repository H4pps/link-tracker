services:
  scrapper:
    build:
      context: .
      dockerfile: scrapper/Dockerfile
    container_name: link-tracker-scrapper
    environment:
      STACKOVERFLOW_KEY: ${STACKOVERFLOW_KEY}
      STACKOVERFLOW_ACCESS_KEY: ${STACKOVERFLOW_ACCESS_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
    ports:
      - "8081:8081"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: link-tracker-bot
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      APP_TELEGRAM_POLLING_ENABLED: ${APP_TELEGRAM_POLLING_ENABLED}
      APP_TELEGRAM_URL: ${APP_TELEGRAM_URL}
    ports:
      - "8080:8080"
    depends_on:
      - scrapper
