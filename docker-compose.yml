services:
  postgres:
    image: postgres:18-alpine
    container_name: link-tracker-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-link_tracker}
      POSTGRES_USER: ${POSTGRES_USER:-link_tracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-link_tracker}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-link_tracker} -d ${POSTGRES_DB:-link_tracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql

  valkey-node-0:
    image: valkey/valkey:8-alpine
    container_name: link-tracker-valkey-0
    command:
      - valkey-server
      - --port
      - "7000"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - valkey-node-0
      - --cluster-announce-port
      - "7000"
      - --cluster-announce-bus-port
      - "17000"
    ports:
      - "17000:7000"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -p 7000 ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - valkey_node_0_data:/data

  valkey-node-1:
    image: valkey/valkey:8-alpine
    container_name: link-tracker-valkey-1
    command:
      - valkey-server
      - --port
      - "7001"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - valkey-node-1
      - --cluster-announce-port
      - "7001"
      - --cluster-announce-bus-port
      - "17001"
    ports:
      - "17001:7001"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -p 7001 ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - valkey_node_1_data:/data

  valkey-node-2:
    image: valkey/valkey:8-alpine
    container_name: link-tracker-valkey-2
    command:
      - valkey-server
      - --port
      - "7002"
      - --cluster-enabled
      - "yes"
      - --cluster-config-file
      - nodes.conf
      - --cluster-node-timeout
      - "5000"
      - --appendonly
      - "yes"
      - --cluster-announce-ip
      - valkey-node-2
      - --cluster-announce-port
      - "7002"
      - --cluster-announce-bus-port
      - "17002"
    ports:
      - "17002:7002"
    healthcheck:
      test: ["CMD-SHELL", "valkey-cli -p 7002 ping | grep -q PONG"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - valkey_node_2_data:/data

  valkey-cluster-init:
    image: valkey/valkey:8-alpine
    container_name: link-tracker-valkey-cluster-init
    depends_on:
      valkey-node-0:
        condition: service_healthy
      valkey-node-1:
        condition: service_healthy
      valkey-node-2:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        yes yes | valkey-cli --cluster create valkey-node-0:7000 valkey-node-1:7001 valkey-node-2:7002 --cluster-replicas 0 || true
        for attempt in $(seq 1 30); do
          cluster_info="$(valkey-cli -h valkey-node-0 -p 7000 cluster info)"
          if echo "$$cluster_info" | grep -q 'cluster_state:ok' && echo "$$cluster_info" | grep -q 'cluster_known_nodes:3'; then
            exit 0
          fi
          sleep 1
        done
        echo "$$cluster_info"
        exit 1

  kafka-1:
    image: apache/kafka:4.1.1
    container_name: link-tracker-kafka-1
    environment:
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-5L6g3nShT-eMCtK--X86sw}
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-1:9092,EXTERNAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "19092:19092"

  kafka-2:
    image: apache/kafka:4.1.1
    container_name: link-tracker-kafka-2
    environment:
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-5L6g3nShT-eMCtK--X86sw}
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-2:9092,EXTERNAL://localhost:19093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "19093:19093"

  kafka-3:
    image: apache/kafka:4.1.1
    container_name: link-tracker-kafka-3
    environment:
      CLUSTER_ID: ${KAFKA_KRAFT_CLUSTER_ID:-5L6g3nShT-eMCtK--X86sw}
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19094
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-3:9092,EXTERNAL://localhost:19094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka-1:9093,2@kafka-2:9093,3@kafka-3:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
    ports:
      - "19094:19094"

  schema-registry:
    image: confluentinc/cp-schema-registry:8.1.0
    container_name: link-tracker-schema-registry
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8085
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka-1:9092,PLAINTEXT://kafka-2:9092,PLAINTEXT://kafka-3:9092
    ports:
      - "8085:8085"
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3

  topic-init:
    image: apache/kafka:4.1.1
    container_name: link-tracker-topic-init
    depends_on:
      - kafka-1
      - kafka-2
      - kafka-3
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        until /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --list >/dev/null 2>&1; do sleep 2; done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --create --if-not-exists --topic ${APP_KAFKA_RAW_UPDATES_TOPIC:-link.raw-updates} --partitions 3 --replication-factor 3 --config min.insync.replicas=2
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --create --if-not-exists --topic ${APP_KAFKA_RAW_UPDATES_DLQ_TOPIC:-link.raw-updates-dlq} --partitions 3 --replication-factor 3 --config min.insync.replicas=2
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --create --if-not-exists --topic ${APP_KAFKA_PROCESSED_UPDATES_TOPIC:-link.processed-updates} --partitions 3 --replication-factor 3 --config min.insync.replicas=2
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka-1:9092 --create --if-not-exists --topic ${APP_KAFKA_PROCESSED_UPDATES_DLQ_TOPIC:-link.processed-updates-dlq} --partitions 3 --replication-factor 3 --config min.insync.replicas=2

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: link-tracker-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka-1:9092,kafka-2:9092,kafka-3:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8085
    ports:
      - "8086:8080"
    depends_on:
      - schema-registry

  scrapper:
    build:
      context: .
      dockerfile: scrapper/Dockerfile
    container_name: link-tracker-scrapper
    environment:
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/link_tracker}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-link_tracker}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-link_tracker}
      APP_DATABASE_ACCESS_TYPE: ${APP_DATABASE_ACCESS_TYPE:-SQL}
      STACKOVERFLOW_KEY: ${STACKOVERFLOW_KEY}
      STACKOVERFLOW_ACCESS_KEY: ${STACKOVERFLOW_ACCESS_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      APP_SCRAPPER_GRPC_SERVER_PORT: ${APP_SCRAPPER_GRPC_SERVER_PORT:-9091}
      APP_BOT_MODE: ${APP_BOT_MODE:-kafka}
      APP_BOT_BASE_URL: ${APP_BOT_BASE_URL:-http://bot:8080}
      APP_BOT_GRPC_HOST: ${APP_BOT_GRPC_HOST:-bot}
      APP_BOT_GRPC_PORT: ${APP_BOT_GRPC_PORT:-9090}
      APP_BOT_GRPC_DEADLINE: ${APP_BOT_GRPC_DEADLINE:-3s}
      APP_SCHEDULER_ENABLED: ${APP_SCHEDULER_ENABLED:-true}
      APP_SCHEDULER_INTERVAL: ${APP_SCHEDULER_INTERVAL:-30s}
      APP_SCHEDULER_LINK_PAGE_SIZE: ${APP_SCHEDULER_LINK_PAGE_SIZE:-100}
      APP_SCHEDULER_WORKER_COUNT: ${APP_SCHEDULER_WORKER_COUNT:-4}
      APP_GITHUB_BASE_URL: ${APP_GITHUB_BASE_URL:-https://api.github.com}
      APP_STACKOVERFLOW_BASE_URL: ${APP_STACKOVERFLOW_BASE_URL:-https://api.stackexchange.com}
      APP_KAFKA_BOOTSTRAP_SERVERS: ${APP_KAFKA_BOOTSTRAP_SERVERS:-kafka-1:9092,kafka-2:9092,kafka-3:9092}
      APP_KAFKA_SCHEMA_REGISTRY_URL: ${APP_KAFKA_SCHEMA_REGISTRY_URL:-http://schema-registry:8085}
      APP_KAFKA_RAW_UPDATES_TOPIC: ${APP_KAFKA_RAW_UPDATES_TOPIC:-link.raw-updates}
      APP_KAFKA_MAX_ATTEMPTS: ${APP_KAFKA_MAX_ATTEMPTS:-3}
      APP_KAFKA_RETRY_BACKOFF: ${APP_KAFKA_RETRY_BACKOFF:-1s}
      APP_KAFKA_OUTBOX_BATCH_SIZE: ${APP_KAFKA_OUTBOX_BATCH_SIZE:-100}
      APP_KAFKA_OUTBOX_PUBLISH_INTERVAL: ${APP_KAFKA_OUTBOX_PUBLISH_INTERVAL:-5s}
      APP_VALKEY_CLUSTER_NODES: ${APP_VALKEY_CLUSTER_NODES:-valkey-node-0:7000,valkey-node-1:7001,valkey-node-2:7002}
      APP_VALKEY_TIMEOUT: ${APP_VALKEY_TIMEOUT:-2s}
      APP_CACHE_LIST_LINKS_ENABLED: ${APP_CACHE_LIST_LINKS_ENABLED:-true}
      APP_CACHE_LIST_LINKS_TTL: ${APP_CACHE_LIST_LINKS_TTL:-10m}
    ports:
      - "8081:8081"
      - "9091:9091"
    depends_on:
      postgres:
        condition: service_healthy
      valkey-cluster-init:
        condition: service_completed_successfully
      topic-init:
        condition: service_completed_successfully

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: link-tracker-bot
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/link_tracker}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-link_tracker}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-link_tracker}
      APP_TELEGRAM_POLLING_ENABLED: ${APP_TELEGRAM_POLLING_ENABLED:-false}
      APP_TELEGRAM_URL: ${APP_TELEGRAM_URL:-https://api.telegram.org/bot}
      APP_BOT_GRPC_SERVER_PORT: ${APP_BOT_GRPC_SERVER_PORT:-9090}
      APP_SCRAPPER_MODE: ${APP_SCRAPPER_MODE:-grpc}
      APP_SCRAPPER_BASE_URL: ${APP_SCRAPPER_BASE_URL:-http://scrapper:8081}
      APP_SCRAPPER_GRPC_HOST: ${APP_SCRAPPER_GRPC_HOST:-scrapper}
      APP_SCRAPPER_GRPC_PORT: ${APP_SCRAPPER_GRPC_PORT:-9091}
      APP_SCRAPPER_GRPC_DEADLINE: ${APP_SCRAPPER_GRPC_DEADLINE:-3s}
      APP_KAFKA_ENABLED: ${APP_KAFKA_ENABLED:-true}
      APP_KAFKA_BOOTSTRAP_SERVERS: ${APP_KAFKA_BOOTSTRAP_SERVERS:-kafka-1:9092,kafka-2:9092,kafka-3:9092}
      APP_KAFKA_SCHEMA_REGISTRY_URL: ${APP_KAFKA_SCHEMA_REGISTRY_URL:-http://schema-registry:8085}
      APP_KAFKA_PROCESSED_UPDATES_TOPIC: ${APP_KAFKA_PROCESSED_UPDATES_TOPIC:-link.processed-updates}
      APP_KAFKA_PROCESSED_UPDATES_DLQ_TOPIC: ${APP_KAFKA_PROCESSED_UPDATES_DLQ_TOPIC:-link.processed-updates-dlq}
      APP_KAFKA_CONSUMER_GROUP: ${APP_KAFKA_CONSUMER_GROUP:-link-tracker-bot}
      APP_KAFKA_MAX_ATTEMPTS: ${APP_KAFKA_MAX_ATTEMPTS:-3}
      APP_KAFKA_RETRY_BACKOFF: ${APP_KAFKA_RETRY_BACKOFF:-1s}
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      postgres:
        condition: service_healthy
      topic-init:
        condition: service_completed_successfully
      scrapper:
        condition: service_started

  ai-agent:
    build:
      context: .
      dockerfile: ai-agent/Dockerfile
    container_name: link-tracker-ai-agent
    environment:
      APP_KAFKA_ENABLED: ${APP_KAFKA_ENABLED:-true}
      APP_KAFKA_BOOTSTRAP_SERVERS: ${APP_KAFKA_BOOTSTRAP_SERVERS:-kafka-1:9092,kafka-2:9092,kafka-3:9092}
      APP_KAFKA_SCHEMA_REGISTRY_URL: ${APP_KAFKA_SCHEMA_REGISTRY_URL:-http://schema-registry:8085}
      APP_KAFKA_RAW_UPDATES_TOPIC: ${APP_KAFKA_RAW_UPDATES_TOPIC:-link.raw-updates}
      APP_KAFKA_PROCESSED_UPDATES_TOPIC: ${APP_KAFKA_PROCESSED_UPDATES_TOPIC:-link.processed-updates}
      APP_KAFKA_RAW_UPDATES_DLQ_TOPIC: ${APP_KAFKA_RAW_UPDATES_DLQ_TOPIC:-link.raw-updates-dlq}
      APP_KAFKA_CONSUMER_GROUP: ${APP_AI_AGENT_CONSUMER_GROUP:-ai-agent}
      APP_KAFKA_MAX_ATTEMPTS: ${APP_KAFKA_MAX_ATTEMPTS:-3}
      APP_KAFKA_RETRY_BACKOFF: ${APP_KAFKA_RETRY_BACKOFF:-1s}
      APP_AI_AGENT_STOP_WORDS: ${APP_AI_AGENT_STOP_WORDS:-}
      APP_AI_AGENT_EXCLUDED_AUTHORS: ${APP_AI_AGENT_EXCLUDED_AUTHORS:-}
      APP_AI_AGENT_MIN_LENGTH: ${APP_AI_AGENT_MIN_LENGTH:-20}
      APP_AI_AGENT_SUMMARIZATION_MODE: ${APP_AI_AGENT_SUMMARIZATION_MODE:-stub}
      APP_AI_AGENT_SUMMARIZATION_THRESHOLD: ${APP_AI_AGENT_SUMMARIZATION_THRESHOLD:-500}
      APP_AI_OPENAI_BASE_URL: ${APP_AI_OPENAI_BASE_URL:-https://api.openai.com}
      APP_AI_OPENAI_API_KEY: ${APP_AI_OPENAI_API_KEY:-dummy-key}
      APP_AI_OPENAI_MODEL: ${APP_AI_OPENAI_MODEL:-gpt-4o-mini}
    ports:
      - "8082:8082"
    depends_on:
      topic-init:
        condition: service_completed_successfully

volumes:
  postgres_data:
  valkey_node_0_data:
  valkey_node_1_data:
  valkey_node_2_data:
