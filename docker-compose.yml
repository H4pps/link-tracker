services:
  scrapper:
    build:
      context: .
      dockerfile: scrapper/Dockerfile
    container_name: link-tracker-scrapper
    environment:
      STACKOVERFLOW_KEY: ${STACKOVERFLOW_KEY}
      STACKOVERFLOW_ACCESS_KEY: ${STACKOVERFLOW_ACCESS_KEY}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      APP_SCRAPPER_GRPC_SERVER_PORT: ${APP_SCRAPPER_GRPC_SERVER_PORT:-9091}
      APP_BOT_MODE: ${APP_BOT_MODE:-grpc}
      APP_BOT_BASE_URL: ${APP_BOT_BASE_URL:-http://bot:8080}
      APP_BOT_GRPC_HOST: ${APP_BOT_GRPC_HOST:-bot}
      APP_BOT_GRPC_PORT: ${APP_BOT_GRPC_PORT:-9090}
      APP_BOT_GRPC_DEADLINE: ${APP_BOT_GRPC_DEADLINE:-3s}
      APP_SCHEDULER_ENABLED: ${APP_SCHEDULER_ENABLED:-true}
      APP_SCHEDULER_INTERVAL: ${APP_SCHEDULER_INTERVAL:-30s}
      APP_GITHUB_BASE_URL: ${APP_GITHUB_BASE_URL:-https://api.github.com}
      APP_STACKOVERFLOW_BASE_URL: ${APP_STACKOVERFLOW_BASE_URL:-https://api.stackexchange.com}
    ports:
      - "8081:8081"
      - "9091:9091"

  bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    container_name: link-tracker-bot
    environment:
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      APP_TELEGRAM_POLLING_ENABLED: ${APP_TELEGRAM_POLLING_ENABLED:-false}
      APP_TELEGRAM_URL: ${APP_TELEGRAM_URL:-https://api.telegram.org/bot}
      APP_BOT_GRPC_SERVER_PORT: ${APP_BOT_GRPC_SERVER_PORT:-9090}
      APP_SCRAPPER_MODE: ${APP_SCRAPPER_MODE:-grpc}
      APP_SCRAPPER_BASE_URL: ${APP_SCRAPPER_BASE_URL:-http://scrapper:8081}
      APP_SCRAPPER_GRPC_HOST: ${APP_SCRAPPER_GRPC_HOST:-scrapper}
      APP_SCRAPPER_GRPC_PORT: ${APP_SCRAPPER_GRPC_PORT:-9091}
      APP_SCRAPPER_GRPC_DEADLINE: ${APP_SCRAPPER_GRPC_DEADLINE:-3s}
    ports:
      - "8080:8080"
      - "9090:9090"
    depends_on:
      - scrapper
