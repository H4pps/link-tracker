syntax = "proto3";

package linktracker.grpc;

option java_package = "com.linktracker.grpc";
option java_multiple_files = true;
option java_outer_classname = "LinkTrackerGrpcProto";

message Ack {
  bool accepted = 1;
}

message ChatRequest {
  int64 chat_id = 1;
}

message ListLinksRequest {
  int64 chat_id = 1;
  int32 limit = 2;
  int64 offset = 3;
}

message AddLinkRequest {
  int64 chat_id = 1;
  string url = 2;
  repeated string tags = 3;
  repeated string filters = 4;
}

message RemoveLinkRequest {
  int64 chat_id = 1;
  string url = 2;
}

message Link {
  int64 id = 1;
  string url = 2;
  repeated string tags = 3;
  repeated string filters = 4;
}

message Tag {
  int64 id = 1;
  string name = 2;
}

message TagIdRequest {
  int64 tag_id = 1;
}

message TagNameRequest {
  string name = 1;
}

message RenameTagRequest {
  int64 tag_id = 1;
  string name = 2;
}

message ListTagsRequest {
  int32 limit = 1;
  int64 offset = 2;
}

message ListLinksResponse {
  repeated Link links = 1;
  int32 size = 2;
}

message ListTagsResponse {
  repeated Tag tags = 1;
  int32 size = 2;
}

message LinkUpdateRequest {
  int64 id = 1;
  string url = 2;
  string description = 3;
  repeated int64 tg_chat_ids = 4;
}

service ScrapperService {
  rpc RegisterChat(ChatRequest) returns (Ack);
  rpc DeleteChat(ChatRequest) returns (Ack);
  rpc ListLinks(ListLinksRequest) returns (ListLinksResponse);
  rpc AddLink(AddLinkRequest) returns (Link);
  rpc RemoveLink(RemoveLinkRequest) returns (Link);
  rpc CreateTag(TagNameRequest) returns (Tag);
  rpc GetTag(TagIdRequest) returns (Tag);
  rpc GetTagByName(TagNameRequest) returns (Tag);
  rpc ListTags(ListTagsRequest) returns (ListTagsResponse);
  rpc RenameTag(RenameTagRequest) returns (Tag);
  rpc DeleteTag(TagIdRequest) returns (Ack);
}

service BotService {
  rpc SendUpdate(LinkUpdateRequest) returns (Ack);
}
