server:
  port: 8080

spring:
  application:
    name: bot
  config:
    import: optional:file:.env[.properties],optional:file:bot/.env[.properties]
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/link_tracker}
    username: ${SPRING_DATASOURCE_USERNAME:link_tracker}
    password: ${SPRING_DATASOURCE_PASSWORD:link_tracker}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  sql:
    init:
      mode: always
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${APP_KAFKA_CONSUMER_GROUP:link-tracker-bot}
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.ByteArrayDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      properties:
        schema.registry.url: ${APP_KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8085}
    listener:
      ack-mode: record

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level --- [%15.15t] %-40.40logger{39} : %msg %kvp%n%wEx"

app:
  grpc:
    server:
      port: ${APP_BOT_GRPC_SERVER_PORT:9090}
  telegram:
    url: ${APP_TELEGRAM_URL:https://api.telegram.org/bot}
    token: ${TELEGRAM_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
    update-listener-sleep: ${APP_TELEGRAM_UPDATE_LISTENER_SLEEP:1s}
    polling-enabled: ${APP_TELEGRAM_POLLING_ENABLED:true}
    debug: ${APP_TELEGRAM_DEBUG:false}
  scrapper:
    mode: ${APP_SCRAPPER_MODE:grpc}
    base-url: ${APP_SCRAPPER_BASE_URL:http://localhost:8081}
    grpc-host: ${APP_SCRAPPER_GRPC_HOST:localhost}
    grpc-port: ${APP_SCRAPPER_GRPC_PORT:9091}
    grpc-deadline: ${APP_SCRAPPER_GRPC_DEADLINE:3s}
    connect-timeout: ${APP_SCRAPPER_CONNECT_TIMEOUT:2s}
    read-timeout: ${APP_SCRAPPER_READ_TIMEOUT:5s}
  kafka:
    enabled: ${APP_KAFKA_ENABLED:true}
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    schema-registry-url: ${APP_KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8085}
    link-updates-topic: ${APP_KAFKA_LINK_UPDATES_TOPIC:link-updates}
    link-updates-dlq-topic: ${APP_KAFKA_LINK_UPDATES_DLQ_TOPIC:link-updates-dlq}
    consumer-group: ${APP_KAFKA_CONSUMER_GROUP:link-tracker-bot}
    max-attempts: ${APP_KAFKA_MAX_ATTEMPTS:3}
    retry-backoff: ${APP_KAFKA_RETRY_BACKOFF:1s}
  resilience:
    retry:
      max-attempts: ${APP_RESILIENCE_RETRY_MAX_ATTEMPTS:3}
      backoff: ${APP_RESILIENCE_RETRY_BACKOFF:200ms}
      retryable-http-statuses: ${APP_RESILIENCE_RETRY_RETRYABLE_HTTP_STATUSES:500,502,503,504}
    circuit-breaker:
      failure-rate-threshold: ${APP_RESILIENCE_CIRCUIT_BREAKER_FAILURE_RATE_THRESHOLD:50}
      sliding-window-size: ${APP_RESILIENCE_CIRCUIT_BREAKER_SLIDING_WINDOW_SIZE:10}
      minimum-number-of-calls: ${APP_RESILIENCE_CIRCUIT_BREAKER_MINIMUM_NUMBER_OF_CALLS:5}
      permitted-calls-in-half-open-state: ${APP_RESILIENCE_CIRCUIT_BREAKER_PERMITTED_CALLS_IN_HALF_OPEN_STATE:2}
      open-state-duration: ${APP_RESILIENCE_CIRCUIT_BREAKER_OPEN_STATE_DURATION:5s}
    rate-limit:
      limit-for-period: ${APP_RESILIENCE_RATE_LIMIT_LIMIT_FOR_PERIOD:60}
      limit-refresh-period: ${APP_RESILIENCE_RATE_LIMIT_LIMIT_REFRESH_PERIOD:1m}
      timeout-duration: ${APP_RESILIENCE_RATE_LIMIT_TIMEOUT_DURATION:0ms}
