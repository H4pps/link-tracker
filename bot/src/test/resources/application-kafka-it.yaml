app:
  grpc:
    server:
      port: 0
  telegram:
    url: http://localhost:9/bot
    token: kafka-it-token
    update-listener-sleep: 1s
    polling-enabled: false
    debug: false
  scrapper:
    mode: http
    base-url: http://localhost:9
    connect-timeout: 500ms
    read-timeout: 500ms
  kafka:
    enabled: true
    max-attempts: 2
    retry-backoff: 50ms
