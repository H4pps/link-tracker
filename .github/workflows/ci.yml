name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_ARGS: --batch-mode --no-transfer-progress

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build application modules
        run: |
          chmod +x ./mvnw
          ./mvnw $MAVEN_ARGS -pl bot,scrapper,ai-agent -am package \
            -Dmaven.test.skip=true \
            -Djacoco.skip=true \
            -Dspring-boot.repackage.skip=true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run static checks
        run: |
          chmod +x ./mvnw
          ./mvnw $MAVEN_ARGS -pl bot,scrapper,ai-agent -am compile \
            spotless:check \
            modernizer:modernizer \
            spotbugs:check \
            pmd:check \
            pmd:cpd-check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    needs: build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Run unit tests
        run: |
          chmod +x ./mvnw
          ./mvnw $MAVEN_ARGS -pl bot,scrapper,ai-agent -am test \
            -DskipITs=true \
            -Djacoco.skip=true
