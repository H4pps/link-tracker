server:
  port: 8081

spring:
  application:
    name: scrapper
  config:
    import: optional:file:.env[.properties],optional:file:scrapper/.env[.properties]
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: io.confluent.kafka.serializers.KafkaAvroSerializer
      acks: all
      properties:
        enable.idempotence: true
    properties:
      schema.registry.url: ${APP_KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8085}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/link_tracker}
    username: ${SPRING_DATASOURCE_USERNAME:link_tracker}
    password: ${SPRING_DATASOURCE_PASSWORD:link_tracker}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
  liquibase:
    change-log: classpath:/migrations/db.changelog-master.yaml
  data:
    redis:
      cluster:
        nodes: ${APP_VALKEY_CLUSTER_NODES:localhost:17000,localhost:17001,localhost:17002,localhost:17003,localhost:17004,localhost:17005}
      timeout: ${APP_VALKEY_TIMEOUT:2s}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level --- [%15.15t] %-40.40logger{39} : %msg %kvp%n%wEx"

app:
  grpc:
    server:
      port: ${APP_SCRAPPER_GRPC_SERVER_PORT:9091}
  bot:
    mode: ${APP_BOT_MODE:kafka}
    base-url: ${APP_BOT_BASE_URL:http://localhost:8080}
    grpc-host: ${APP_BOT_GRPC_HOST:localhost}
    grpc-port: ${APP_BOT_GRPC_PORT:9090}
    grpc-deadline: ${APP_BOT_GRPC_DEADLINE:3s}
    connect-timeout: ${APP_BOT_CONNECT_TIMEOUT:2s}
    read-timeout: ${APP_BOT_READ_TIMEOUT:5s}
  kafka:
    bootstrap-servers: ${APP_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    schema-registry-url: ${APP_KAFKA_SCHEMA_REGISTRY_URL:http://localhost:8085}
    link-updates-topic: ${APP_KAFKA_LINK_UPDATES_TOPIC:link-updates}
    link-updates-dlq-topic: ${APP_KAFKA_LINK_UPDATES_DLQ_TOPIC:link-updates-dlq}
    consumer-group: ${APP_KAFKA_CONSUMER_GROUP:link-tracker-bot}
    max-attempts: ${APP_KAFKA_MAX_ATTEMPTS:3}
    retry-backoff: ${APP_KAFKA_RETRY_BACKOFF:1s}
    outbox-batch-size: ${APP_KAFKA_OUTBOX_BATCH_SIZE:100}
    outbox-publish-interval: ${APP_KAFKA_OUTBOX_PUBLISH_INTERVAL:5s}
  scheduler:
    enabled: ${APP_SCHEDULER_ENABLED:true}
    interval: ${APP_SCHEDULER_INTERVAL:30s}
    link-page-size: ${APP_SCHEDULER_LINK_PAGE_SIZE:100}
    worker-count: ${APP_SCHEDULER_WORKER_COUNT:1}
  database:
    access-type: ${APP_DATABASE_ACCESS_TYPE:SQL}
  cache:
    list-links:
      enabled: ${APP_CACHE_LIST_LINKS_ENABLED:true}
      ttl: ${APP_CACHE_LIST_LINKS_TTL:10m}
    client-side-enabled: ${APP_CACHE_CLIENT_SIDE_ENABLED:true}
  stackoverflow:
    base-url: ${APP_STACKOVERFLOW_BASE_URL:https://api.stackexchange.com}
    key: ${STACKOVERFLOW_KEY} # Use env variable. DO NOT KEEP TOKEN HERE
    access-token: ${STACKOVERFLOW_ACCESS_KEY} # Use env variable. DO NOT KEEP TOKEN HERE
    connect-timeout: ${APP_STACKOVERFLOW_CONNECT_TIMEOUT:2s}
    read-timeout: ${APP_STACKOVERFLOW_READ_TIMEOUT:5s}
  github:
    base-url: ${APP_GITHUB_BASE_URL:https://api.github.com}
    token: ${GITHUB_TOKEN} # Use env variable. DO NOT KEEP TOKEN HERE
    connect-timeout: ${APP_GITHUB_CONNECT_TIMEOUT:2s}
    read-timeout: ${APP_GITHUB_READ_TIMEOUT:5s}
